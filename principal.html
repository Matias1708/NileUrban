        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);

        // Función para obtener todas las reservas
        async function getRecords() {
            const reservationsCol = collection(db, 'Reserva');
            // const querySnapshot = await getDocs(reservationsCol);
            // const reservations = [];

            // querySnapshot.forEach((doc) => {
            //     const data = doc.data();
            //     reservations.push({ id: doc.id, ...data });
            // });

            const querySnapshot = await getDocs(reservationsCol);
            const reservations = [];

            querySnapshot.forEach((doc) => {
                const data = doc.data();

                // 🟢 CORRECCIÓN: Solo añadir reservas si el campo 'fecha' existe 🟢
                if (data.fecha) {
                    reservations.push({ id: doc.id, ...data });
                } else {
                    // Esto ayudará a identificar registros mal formados en la consola
                    console.error('Registro de reserva corrupto encontrado y omitido (sin fecha). ID:', doc.id);
                }
            });

            // Agrupar reservas por fecha
            const groupedReservations = reservations.reduce((acc, reservation) => {
                if (!acc[reservation.fecha]) {
                    acc[reservation.fecha] = [];
                }
                acc[reservation.fecha].push(reservation);
                return acc;
            }, {});

            // Ordenar las fechas
            const sortedDates = Object.keys(groupedReservations).sort((a, b) => parseDate(a) - parseDate(b));

            
            // Función para obtener el nombre del día de la semana
            function getDayName(dateString) {
                // Asegurarse de obtener Día, Mes Y Año
                const [day, month, year] = dateString.split('/');

                // Si no se proporcionó el año, usa el actual (o uno fijo si es necesario)
                const fullYear = year ? parseInt(year, 10) : new Date().getFullYear();

                // Crear la fecha usando las 3 partes
                // Nota: El mes es base 0 en JavaScript (enero=0)
                const date = new Date(fullYear, month - 1, day);

                // Verificar si la fecha es válida antes de formatear
                if (isNaN(date.getTime())) {
                    // En caso de error, devolver un texto de error o un valor seguro
                    console.error("Fecha inválida en getDayName:", dateString);
                    return "Fecha Inválida";
                }

                const options = { weekday: 'long' };
                return new Intl.DateTimeFormat('es-ES', options).format(date);
            }

            // Función para verificar si una fecha es pasada
            function isPastDate(dateString) {
                const [day, month, year] = dateString.split('/');
                const date = new Date(year, month - 1, day);
                const today = new Date();
                today.setHours(0, 0, 0, 0); // Resetear horas para comparar solo fechas
                return date < today;
            }

            function isPastHour(reservationHour) {
                const now = new Date();
                const [reservationHourInt, reservationMinute] = reservationHour.split(':').map(Number);
                const reservationTime = new Date();
                reservationTime.setHours(reservationHourInt, reservationMinute);

                return reservationTime < now;
            }

            // Función para ordenar las reservas por hora
            function sortReservationsByTime(reservations) {
                return reservations.sort((a, b) => {
                    // Suponiendo que la hora está en formato "HH:mm"
                    const [aHour, aMinute] = a.hora.split(':').map(Number);
                    const [bHour, bMinute] = b.hora.split(':').map(Number);
                    return aHour - bHour || aMinute - bMinute;
                });
            }

            // Función para agrupar reservas por barbero
            function groupReservationsByBarber(reservations) {
                return reservations.reduce((acc, reservation) => {
                    if (!acc[reservation.profesional]) {
                        acc[reservation.profesional] = [];
                    }
                    acc[reservation.profesional].push(reservation);
                    return acc;
                }, {});
            }

            const appointmentList = document.getElementById('appointment-list');
            appointmentList.innerHTML = ''; // Limpiar la lista antes de agregar los nuevos elementos

            // Crear contenedor principal para las columnas de barberos
            const barberContainer = document.createElement('div');
            barberContainer.className = 'barber-columns-container';
            barberContainer.innerHTML = `
                <div class="view-controls">
                    <button id="column-view-btn" class="view-btn active">Vista por Columnas</button>
                    <button id="filter-view-btn" class="view-btn">Vista con Filtro</button>
                    <a href="finance.html" class="view-btn" style="text-decoration: none;">Ir a Finanzas</a>
                </div>
                <div id="column-view" class="view-content">
                    <div class="barber-columns" id="barber-columns"></div>
                </div>
                <div id="filter-view" class="view-content" style="display: none;">
                    <div class="filter-controls">
                        <label for="barber-filter" style="color: white; margin-right: 10px;">Filtrar por barbero:</label>
                        <select id="barber-filter">
                            <option value="">Todos los barberos</option>
                            <option value="Pablo">Pablo</option>
                            <option value="Lautaro">Lautaro</option>
                            <option value="Nicolas">Nicolas</option>
                            <option value="Matias">Matias</option>
                        </select>
                    </div>
                    <div id="filtered-appointments"></div>
                </div>
            `;
            appointmentList.appendChild(barberContainer);

            // Función para renderizar vista por columnas
            function renderColumnView() {
                const barberColumns = document.getElementById('barber-columns');
                barberColumns.innerHTML = '';

                // Obtener todos los barberos únicos
                const allBarbers = [...new Set(reservations.map(r => r.profesional))];

                // Si no hay barberos, mostrar mensaje
                if (allBarbers.length === 0) {
                    barberColumns.innerHTML = '<p style="text-align: center; color: #ccc;">No hay turnos reservados</p>';
                    return;
                }

                allBarbers.forEach(barber => {
                    const barberColumn = document.createElement('div');
                    barberColumn.className = 'barber-column';
                    barberColumn.innerHTML = `<h3>${barber}</h3>`;

                    // Filtrar reservas por barbero
                    const barberReservations = reservations.filter(r => r.profesional === barber);

                    // Si no hay reservas para este barbero, mostrar mensaje
                    if (barberReservations.length === 0) {
                        const noReservationsMsg = document.createElement('p');
                        noReservationsMsg.textContent = 'Sin turnos';
                        noReservationsMsg.style.color = '#888';
                        noReservationsMsg.style.textAlign = 'center';
                        noReservationsMsg.style.fontStyle = 'italic';
                        barberColumn.appendChild(noReservationsMsg);
                    } else {
                        // Agrupar por fecha
                        const barberGroupedByDate = barberReservations.reduce((acc, reservation) => {
                            if (!acc[reservation.fecha]) {
                                acc[reservation.fecha] = [];
                            }
                            acc[reservation.fecha].push(reservation);
                            return acc;
                        }, {});

                        // Ordenar fechas para este barbero y filtrar fechas pasadas
                        const barberSortedDates = Object.keys(barberGroupedByDate)
                            .filter(date => !isPastDate(date))
                            .sort((a, b) => parseDate(a) - parseDate(b));

                        barberSortedDates.forEach(date => {
                            const dayName = getDayName(date);
                            const dateHeader = document.createElement('h4');
                            dateHeader.textContent = `${dayName} ${date}`;
                            barberColumn.appendChild(dateHeader);

                            const list = document.createElement('ul');
                            const sortedReservations = sortReservationsByTime(barberGroupedByDate[date]);

                            sortedReservations.forEach(reservation => {
                                const listItem = document.createElement('li');
                                listItem.innerHTML =
                                    `<input type="checkbox" class="whatsapp-checkbox" data-id="${reservation.id}" ${reservation.enviar === 'S' ? 'checked' : ''}>
                                <span class="appointment-details">
                                    ${reservation.nombre} - ${reservation.hora}hs - ${reservation.servicio} - 
                                    <a href="https://wa.me/${reservation.contacto}?text=${encodeURIComponent(`¡Hola ${reservation.nombre}! Te recordamos tu turno el dia ${reservation.fecha} a las ${reservation.hora} con ${reservation.profesional} para ${reservation.servicio}. La tolerancia es de 15 minutos. En caso de no asistir, avisar por este medio. ¡Te esperamos!`)}" target="_blank">
                                        ${reservation.contacto}
                                    </a>
                                </span>
                                <button class="delete-btn" data-id="${reservation.id}"><i class="fas fa-trash"></i></button>`;

                                list.appendChild(listItem);

                                // Agregar evento para actualizar Firestore cuando cambie el checkbox
                                const checkbox = listItem.querySelector('.whatsapp-checkbox');
                                checkbox.addEventListener('change', async (event) => {
                                    const isChecked = event.target.checked;
                                    const reservationId = event.target.getAttribute('data-id');

                                    // Llamar a la función para actualizar Firestore
                                    await updateSendStatus(reservationId, isChecked);
                                });
                            });

                            barberColumn.appendChild(list);
                        });
                    }

                    barberColumns.appendChild(barberColumn);
                });
            }

            // Función para renderizar vista con filtro
            function renderFilterView() {
                const filteredAppointments = document.getElementById('filtered-appointments');
                filteredAppointments.innerHTML = '';

                // Filtrar fechas pasadas
                const futureDates = sortedDates.filter(date => !isPastDate(date));

                futureDates.forEach(date => {
                    const dayName = getDayName(date);
                    const dateHeader = document.createElement('h3');
                    dateHeader.textContent = `${dayName} ${date}`;
                    dateHeader.className = `date-header date-${date}`;
                    filteredAppointments.appendChild(dateHeader);

                    const list = document.createElement('ul');
                    const sortedReservations = sortReservationsByTime(groupedReservations[date]);

                    sortedReservations.forEach(reservation => {
                        const listItem = document.createElement('li');
                        listItem.className = `appointment-item barber-${reservation.profesional.toLowerCase()} date-${reservation.fecha}`;
                        listItem.innerHTML =
                            `<input type="checkbox" class="whatsapp-checkbox" data-id="${reservation.id}" ${reservation.enviar === 'S' ? 'checked' : ''}>
                        <span class="appointment-details">
                            <strong>${reservation.profesional}:</strong> ${reservation.nombre} - ${reservation.hora}hs - ${reservation.servicio} - 
                            <a href="https://wa.me/${reservation.contacto}?text=${encodeURIComponent(`¡Hola ${reservation.nombre}! Te recordamos tu turno el dia ${reservation.fecha} a las ${reservation.hora} con ${reservation.profesional} para ${reservation.servicio}. La tolerancia es de 15 minutos. En caso de no asistir, avisar por este medio. ¡Te esperamos!`)}" target="_blank">
                                ${reservation.contacto}
                            </a>
                        </span>
                        <button class="delete-btn" data-id="${reservation.id}"><i class="fas fa-trash"></i></button>`;

                        list.appendChild(listItem);

                        // Agregar evento para actualizar Firestore cuando cambie el checkbox
                        const checkbox = listItem.querySelector('.whatsapp-checkbox');
                        checkbox.addEventListener('change', async (event) => {
                            const isChecked = event.target.checked;
                            const reservationId = event.target.getAttribute('data-id');

                            // Llamar a la función para actualizar Firestore
                            await updateSendStatus(reservationId, isChecked);
                        });
                    });

                    filteredAppointments.appendChild(list);
                });
            }

            // Renderizar vista inicial (columnas)
            renderColumnView();

            // Event listeners para cambiar entre vistas
            document.getElementById('column-view-btn').addEventListener('click', function () {
                document.getElementById('column-view').style.display = 'block';
                document.getElementById('filter-view').style.display = 'none';
                this.classList.add('active');
                document.getElementById('filter-view-btn').classList.remove('active');
            });

            document.getElementById('filter-view-btn').addEventListener('click', function () {
                document.getElementById('column-view').style.display = 'none';
                document.getElementById('filter-view').style.display = 'block';
                this.classList.add('active');
                document.getElementById('column-view-btn').classList.remove('active');
                renderFilterView();
            });

            // Event listener para el filtro de barbero
            document.getElementById('barber-filter').addEventListener('change', function () {
                const selectedBarber = this.value;
                const appointmentItems = document.querySelectorAll('.appointment-item');

                appointmentItems.forEach(item => {
                    if (selectedBarber === '' || item.classList.contains(`barber-${selectedBarber.toLowerCase()}`)) {
                        item.style.display = 'flex';
                    } else {
                        item.style.display = 'none';
                    }
                });
            });

            // Función asíncrona para actualizar el estado de 'enviar' en Firestore
            async function updateSendStatus(reservationId, isChecked) {
                try {
                    // Obtener la referencia al documento
                    const reservationRef = doc(db, 'Reserva', reservationId);

                    // Actualizar el campo 'enviar' en Firestore
                    await updateDoc(reservationRef, {
                        enviar: isChecked ? 'S' : 'N'
                    });

                    console.log('Estado de envío actualizado en Firestore');
                } catch (error) {
                    console.error('Error al actualizar el estado de envío:', error);
                }
            }
        }

        async function handleAppointmentListClick(e) {
            const deleteBtn = e.target.closest('.delete-btn');
            if (!deleteBtn) return;

            const id = deleteBtn.dataset.id;
            if (!id) return;

            if (!confirm('¿Estás seguro de que deseas eliminar este turno?')) return;

            try {
                await deleteDoc(doc(db, 'Reserva', id));
                alert('Turno eliminado con éxito');
                await getRecords(); // Recargar la lista
            } catch (error) {
                console.error('Error al eliminar el turno: ', error);
                alert('Error al eliminar: ' + error.message);
            }
        }

        // Función para obtener las reservas para una fecha y profesional específicos
        async function getReservationsForDateAndProfessional(date, professional) {
            const querySnapshot = await getDocs(query(
                collection(db, 'Reserva'),
                where('fecha', '==', date),
                where('profesional', '==', professional)
            ));
            const reservations = [];
            querySnapshot.forEach((doc) => {
                reservations.push(doc.data());
            });
            return reservations;
        }
        let isBooking = false;

        async function bookAppointment() {
            if (isBooking) return;

            const name = document.getElementById('name').value;
            const date = document.getElementById('calendar').value;
            const time = document.getElementById('time').value;
            const professional = document.getElementById('professional').value;
            const service = document.getElementById('service').value;
            const phone = document.getElementById('phone').value;

            if (name && date && time && professional && service && phone) {
                // Validar que la fecha no sea posterior a una semana desde hoy
                const today = new Date();
                const maxDate = new Date(today);
                maxDate.setDate(today.getDate() + 90);




                const [day, month, year] = date.split('/');
                const selectedDate = new Date(year, month - 1, day);



                if (selectedDate > maxDate) {
                    alert('Actualmente no estamos aceptando reservas para después de la semana próxima debido a actualizaciones en nuestro sistema. Por favor, intenta nuevamente más tarde.');
                    return;
                }

                

                if (professional === 'Matias') {
                    const dayOfWeek = selectedDate.getDay();
                    
                    // Matias puede atender: Lunes (1), Miércoles (3), Jueves (4), Viernes (5) y Sábado (6). No Domingo (0) ni Martes (2).
                    if (dayOfWeek === 3  || dayOfWeek === 4 || dayOfWeek === 5 || dayOfWeek === 6) {
                        // Días válidos, continuar con la reserva
                        console.log('Matias: Día válido para reserva (Lunes, Miércoles, Jueves, Viernes o Sábado).');
                    } else {
                        // 🟢 EXCEPCIÓN PARA DÍAS ESPECIALES 🟢
                        // La variable 'date' (DD/MM/YYYY) está disponible en la función.
                        const specialDates = [
                            '22/12/2025',
                            '23/12/2025', // 👈 ¡Nuevo! Martes 23
                            '24/12/2025', // 👈 ¡Nuevo! Miércoles 24
                            '29/12/2025',
                            '30/12/2025', // 👈 ¡Nuevo! Martes 30
                            '31/12/2025',  // 👈 ¡Nuevo! Miércoles 31
                            '06/01/2026',  // 👈 Martes 6
                            '07/01/2026',  // 👈 Miércoles 7
                            '08/01/2026',  // 👈 Jueves 8
                            '09/01/2026',  // 👈 Viernes 9
                            '10/01/2026',   // 👈 Sábado 10
                            '20/01/2026',  // 👈 Martes 20 - Semana especial
                            '21/01/2026',  // 👈 Miércoles 21 - Semana especial
                            '22/01/2026',  // 👈 Jueves 22 - Semana especial
                            '23/01/2026',  // 👈 Viernes 23 - Semana especial
                            '24/01/2026'   // 👈 Sábado 24 - Semana especial
                        ];

                        // Especial: lista de fechas + todos los martes del año
                        if (specialDates.includes(date) || dayOfWeek === 2) {
                            console.log('Matias: Día especial habilitado para reserva (o martes).');
                        } else {
                            alert('Matias solo ofrece turnos los lunes, miércoles, jueves, viernes y sábados.');
                            return;
                        }
                    }
                }
                
                // 🟢 VALIDACIÓN: Lautaro NO atiende los lunes 🟢
                if (professional === 'Lautaro') {
                    const dayOfWeek = selectedDate.getDay();
                    if (dayOfWeek === 0) {
                        alert('Lautaro no atiende los lunes.');
                        return;
                    }
                }
                // 🔴 FIN VALIDACIÓN LAUTARO 🔴
                
                // 🟢 VALIDACIÓN: Nicolas NO atiende los miércoles 🟢
                if (professional === 'Nicolas') {
                    const dayOfWeek = selectedDate.getDay();
                    if (dayOfWeek === 3) {
                        alert('Nicolas no atiende los miércoles.');
                        return;
                    }
                }
                // 🔴 FIN VALIDACIÓN NICOLAS 🔴
                
                // Resto del código de validación y reserva...
                const bookBtn = document.getElementById('book-button');
                const setBookingState = (active) => {
                    isBooking = active;
                    if (bookBtn) {
                        bookBtn.disabled = active;
                        bookBtn.textContent = active ? 'Reservando...' : 'RESERVAR';
                    }
                };

                setBookingState(true);

                try {
                    // Verificar si la hora está disponible
                    const reservations = await getReservationsForDateAndProfessional(date, professional);
                    const reservedTimes = reservations.map(reservation => reservation.hora);

                    if (reservedTimes.includes(time)) {
                        alert('La hora seleccionada ya está reservada. Por favor, elige otra hora.');
                        return;
                    }

                    // Guardar la reserva en Firebase
                    await addDoc(collection(db, 'Reserva'), {
                        nombre: name,
                        fecha: date,
                        hora: time,
                        profesional: professional,
                        servicio: service,
                        contacto: phone,
                        enviar: 'N'
                    });
                    alert(`Se realizó la reserva para el dia ${date} a las ${time}hs con ${professional}, para realizarse el servicio de ${service}. No te olvides, te esperamos!`);
                    await getRecords();
                    showConfirmationModal();
                } catch (error) {
                    console.error('Error al añadir la reserva: ', error);
                } finally {
                    setBookingState(false);
                }
            } else {
                alert('Por favor, completa todos los campos.');
            }
        }
        // === FUNCIÓN populateTimeOptions() CORREGIDA Y COMPLETA ===

            // 🔴 FIN VALIDACIÓN LAUTARO 🔴

            if (dayOfWeek === 2 && professional === 'Nicolas') {

            }
                       // Validación de Matias: permite Lunes (1), Miércoles (3), Jueves (4), Viernes (5) y Sábado (6). Excepción: todos los martes.
            if (professional === 'Matias' && (dayOfWeek === 1 )) {

                    '23/12/2025',
                    '24/12/2025',
                    '29/12/2025',
                    '30/12/2025',
                    '31/12/2025',
                    '06/01/2026',
                    '07/01/2026',
                    '08/01/2026',
                    '09/01/2026',
                    '10/01/2026',
                    '20/01/2026',
                    '21/01/2026',
                    '22/01/2026',
                    '23/01/2026',
                    '24/01/2026',
                    '05/03/2026',
                    '12/03/2026',
                    '19/03/2026'
                ];
                // Día en hora local para detectar martes (el parseo UTC puede mostrar 24/03 como lunes)
                const dayOfWeekLocal = new Date(parseInt(year, 10), parseInt(month, 10) - 1, parseInt(day, 10)).getDay();
                if (!specialDates.includes(date) && dayOfWeekLocal !== 2) {
                    timeSelect.innerHTML = '';
                    const defaultOption = document.createElement('option');
                    defaultOption.value = '';
                    defaultOption.disabled = true;
                    defaultOption.selected = true;
                    defaultOption.textContent = 'Selecciona un horario';
                    timeSelect.appendChild(defaultOption);
                    noAvailableMessage.style.display = 'block';
                    console.log('--- populateTimeOptions FINALIZADA (día inválido para Matias) ---');
                    return;
                }
            }
            noAvailableMessage.textContent = 'No hay turnos disponibles para la fecha seleccionada.';


            // Obtener la hora actual
            const now = new Date();
            const currentDateFormatted = `${now.getFullYear()}-${("0" + (now.getMonth() + 1)).slice(-2)}-${("0" + now.getDate()).slice(-2)}`;

            // Obtén las reservas
            const reservations = await getReservationsForDateAndProfessional(date, professional);
            const reservedTimesForDateAndProfessional = reservations.map(reservation => reservation.hora);


            timeSelect.innerHTML = ''; // Limpiar las opciones actuales
            let hasAvailableTimes = false;

            // Determinar la lista de horarios a iterar: base o una versión filtrada por horario de inicio
            let timesToIterate = [...baseAvailableTimes];

            // 🟢 REGLA: Lunes con turnos de 40 minutos (13:00 a 18:20) para Pablo, Matias y Nicolas 🟢
            // NOTA: dayOfWeek === 1 es Lunes (0=Domingo, 1=Lunes, 2=Martes, etc.)
            if (dayOfWeek === 0 && (professional === 'Pablo' || professional === 'Matias' || professional === 'Nicolas')) {
                console.log(`Regla de lunes aplicada para ${professional}.`);
                const mondayTimes40min = [
                    '13:00',
                    '13:40',
                    '14:20',
                    '15:00',
                    '15:40',
                    '16:20',
                    '17:00',
                    '17:40',
                    '18:20'
                ];
                timesToIterate = mondayTimes40min;
            }
            // 🔴 FIN REGLA LUNES 🔴

            // Pablo los martes trabaja hasta las 15:00 (turnos de 40 min, último 14:20)
            if (dayOfWeek === 1 && professional === 'Pablo') {
                console.log(`Regla de martes aplicada para Pablo (hasta 15:00).`);
                const tuesdayTimesPablo = [
                    '10:00', '10:40', '11:20', '12:00',
                    '13:00', '13:40', '14:20','15:00'
                ];
                timesToIterate = tuesdayTimesPablo;
            }
            // 🔴 FIN REGLA MARTES PABLO 🔴

            // 🟢 REGLA TEMPORAL: Lunes 22/12/2025 y Lunes 29/12/2025 🟢
            if (date === '22/12/2025' || date === '29/12/2025') {
                console.log(`Regla temporal aplicada para el ${date}.`);
                const mondayTimes = [
                    '10:15', '11:00', '11:45', '12:30',
                    '13:30', '14:15', '15:00', '15:45',
                    '16:30', '17:15', '18:00', '18:45',
                    '19:30' // El último turno
                ];
                timesToIterate = mondayTimes;
            }
            // 🔴 FIN REGLA TEMPORAL 🔴

            // 🟢 REGLA TEMPORAL: Semana especial 20-24 de enero 2026 🟢
            const semanaEspecialFechas = [
                '20/01/2026',  // Martes 20
                '21/01/2026',  // Miércoles 21
                '22/01/2026',  // Jueves 22
                '23/01/2026',  // Viernes 23
                '24/01/2026'   // Sábado 24
            ];
            
            if (semanaEspecialFechas.includes(date) && (professional === 'Matias' || professional === 'Lautaro')) {
                console.log(`Regla temporal aplicada para ${professional} el ${date}.`);
                const horariosCompletos = [
                    '10:15', '11:00', '11:45', '12:30',
                    '13:30', '14:15', '15:00', '15:45',
                    '16:30', '17:15', '18:00', '18:45'
                ];
                // Agregar 19:30 para jueves, viernes y sábado (días que normalmente lo tienen)
                if (dayOfWeek === 4 || dayOfWeek === 5 || dayOfWeek === 6) {
                    horariosCompletos.push('19:00');
                }
                timesToIterate = horariosCompletos;
            }
            // 🔴 FIN REGLA TEMPORAL SEMANA ESPECIAL 🔴

            // Matias y Lautaro: martes a viernes trabajan de 13:00 a 19:00 (turnos de 40 min, último 18:20)
            if ((professional === 'Matias' || professional === 'Lautaro') && (dayOfWeek === 1 || dayOfWeek === 2 || dayOfWeek === 3 || dayOfWeek === 4)) {
                timesToIterate = [
                    '13:00', '13:40', '14:20', '15:00', '15:40', '16:20', '17:00', '17:40', '18:20','19:00'
                ];
            }

            // === Lógica de Horario de Inicio por Profesional y Día ===
            // 💡 NOTA: El Lunes es el día de la semana '1' en JavaScript.

            // Verificar si es una fecha de la semana especial (20-24 enero) para Matias o Lautaro
            const esSemanaEspecial = semanaEspecialFechas.includes(date) && (professional === 'Matias' || professional === 'Lautaro');
            
            // Verificar si es lunes con horarios de 40 minutos para Pablo, Matias o Nicolas
            const esLunes40min = dayOfWeek === 0 && (professional === 'Pablo' || professional === 'Matias' || professional === 'Nicolas');
            
            // Verificar si es martes para Pablo (horario especial 10:15 a 15:00)
            const esMartesPablo = dayOfWeek === 1 && professional === 'Pablo';

            if (!esSemanaEspecial && !esLunes40min && !esMartesPablo) {
                // Solo aplicar restricciones de horario si NO es semana especial, ni lunes con 40 min, ni martes de Pablo
                if (professional === 'Nicolas' && dayOfWeek === 2) {
                    timesToIterate = timesToIterate.filter(time => time >= '14:15');

                }
                // Lautaro: Martes, Miércoles, Jueves, Viernes y Sábado empiezan a las 10:15 (horario base, no requiere filtro)
            } else if (esLunes40min) {
                console.log(`${professional}: Usando horarios de 40 minutos los lunes (13:00 - 18:20).`);
            } else if (esMartesPablo) {
                console.log(`Pablo: Usando horario de martes (hasta 15:00).`);
            } else {
                console.log(`${professional}: Usando horario completo en semana especial (${date}).`);
            }
            

            // Aquí se agrega el nuevo horario solo para viernes y sábado (y se asegura que no se duplique si ya está por la regla temporal)
            if (dayOfWeek === 5 || dayOfWeek === 4) {
                if (!timesToIterate.includes('19:00')) {
                    timesToIterate.push('19:00');
                    timesToIterate.sort();
                }
            }
            // No aplicar exclusiones durante la semana especial para Matias y Lautaro, ni en lunes con horarios de 40 min, ni en martes para Pablo
            const currentExclusions = (esSemanaEspecial || esLunes40min || esMartesPablo) ? [] : (professionalSpecificExclusions[professional]?.[dayOfWeek] || []);


            // Iterar sobre la lista de horarios determinada
            timesToIterate.forEach(optionValue => {
                const optionText = `${optionValue} hs`;

                // Convertir la hora del turno a un objeto Date
                const optionDateTime = new Date(`${formattedDate}T${optionValue}:00`);

                // Comprobar si es para el pasado
                const isPast = formattedDate === currentDateFormatted &&
                    (now.getHours() > optionDateTime.getHours() ||
                        (now.getHours() === optionDateTime.getHours() && now.getMinutes() >= optionDateTime.getMinutes()));

                // Comprobar si es una hora excluida específicamente (no aplica en semana especial)
                const isSpecificallyExcluded = currentExclusions.includes(optionValue);

                // Comprobar si ya está reservada
                const isReserved = reservedTimesForDateAndProfessional.includes(optionValue);


                // Si no es en el pasado, no está excluida y no está reservada, agregar la opción
                if (!isPast && !isSpecificallyExcluded && !isReserved) {
                    const option = document.createElement('option');
                    option.value = optionValue;
                    option.textContent = optionText;
                    timeSelect.appendChild(option);
                    hasAvailableTimes = true;
                }
            });

            // Si no se agregaron opciones, añade el mensaje de no disponibles
            if (!hasAvailableTimes) {
                timeSelect.innerHTML = '';
                const defaultOption = document.createElement('option');
                defaultOption.value = "";
                defaultOption.textContent = "No hay turnos disponibles";
                defaultOption.disabled = true;
                timeSelect.appendChild(defaultOption);
                noAvailableMessage.style.display = 'block';
            } else {
                noAvailableMessage.style.display = 'none';
            }


            console.log('--- populateTimeOptions FINALIZADA ---');
        }

        // Función para convertir una fecha a un objeto Date para la comparación
        // function parseDate(dateString) {
        //     const [day, month, year] = dateString.split('/').map(Number);
        //     return new Date(year, month - 1, day);
        // }

        // Función para convertir la fecha (DD/MM/YYYY) a un objeto Date para ordenar
        function parseDate(dateString) {
            // Si no es una cadena o es nula/indefinida, retorna 0 (valor seguro)
            if (!dateString || typeof dateString !== 'string') return 0;

            const parts = dateString.split('/');

            // Si la fecha no tiene 3 partes (día, mes, año), retorna 0
            if (parts.length !== 3) return 0;

            // Devolver el objeto Date. Usamos parts[1]-1 para el mes (JavaScript es base 0)
            const date = new Date(parts[2], parts[1] - 1, parts[0]);

            // Si la fecha es inválida (ej. 31/02/2025), retorna 0
            if (isNaN(date)) return 0;

            return date;
        }

        document.getElementById('send-whatsapp').addEventListener('click', async () => {
            const reservationsCol = collection(db, 'Reserva');
            const querySnapshot = await getDocs(reservationsCol);
            const reservations = [];

            // Obtener la fecha de mañana
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1);

            // Formatear la fecha de mañana a "dd/mm/yyyy"
            const dd = String(tomorrow.getDate()).padStart(2, '0');
            const mm = String(tomorrow.getMonth() + 1).padStart(2, '0'); // Enero es 0
            const yyyy = tomorrow.getFullYear();
            const formattedTomorrow = `${dd}/${mm}/${yyyy}`;

            querySnapshot.forEach((doc) => {
                const data = doc.data();

                // Filtrar por la fecha de mañana
                if (data.fecha === formattedTomorrow) {
                    reservations.push(data);
                }
            });

            console.log(`Reservas de mañana encontradas: ${reservations.length}`);

            if (reservations.length === 0) {
                alert('No hay turnos de mañana para enviar.');
                return;
            }

            // Enviar mensajes con setTimeout para asegurar la apertura correcta de cada mensaje
            reservations.forEach((reservation, index) => {
                const phoneNumber = `549${reservation.contacto}`;
                // const message = `¡Hola ${reservation.nombre}! Te recordamos tu turno de mañana a las ${reservation.hora} con ${reservation.profesional} para ${reservation.servicio}. ¡Te esperamos!`;
                const message = `¡Hola ${reservation.nombre}! Te recordamos tu turno de mañana a las ${reservation.hora} con ${reservation.profesional} para ${reservation.servicio}. La tolerancia es de 15 minutos. ¡Te esperamos!

        **Recordatorio importante:** En caso de no poder asistir, solicitamos avisar con un mínimo de **2 horas de anticipación**. De lo contrario, se deberá abonar el valor total del servicio.`;
                console.log(`Enviando mensaje a: ${phoneNumber}`);
                console.log(`Mensaje: ${message}`);

                // URL de WhatsApp con mensaje prellenado y parámetro aleatorio
                const randomParam = Math.random().toString(36).substring(7); // Generar una cadena aleatoria
                const whatsappUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodeURIComponent(message)}&random=${randomParam}`;

                // Abrir el enlace de WhatsApp con un pequeño retraso para cada mensaje
                setTimeout(() => {
                    window.open(whatsappUrl, `_blank`);
                }, index * 1500); // Incrementar el tiempo de espera para cada mensaje (1.5 segundos por mensaje)
            });
        });









        // --- LOGICA DEL BOT DE CONSULTA ---
        const botBtn = document.getElementById('bot-btn');
        const botModal = document.getElementById('bot-modal');
        const closeBotBtn = document.getElementById('close-bot-modal');

            });

        window.addEventListener('click', (event) => {
            // Verificamos si el clic fue en el modal contenedor (fondo oscuro)
            if (event.target == botModal) {
                botModal.style.display = "none";
            }
        });

        if (botConsultBtn) {
            botConsultBtn.addEventListener('click', async () => {
                const phone = botPhoneInput.value.trim();

                if (!phone) {
                    alert("Por favor, ingresa tu número de teléfono.");
                    return;
                }

                botResults.innerHTML = '<p style="text-align:center; color: #ccc;">Buscando...</p>';

                try {
                    // Consulta simple por coincidencia exacta del campo 'contacto'
                    const q = query(collection(db, "Reserva"), where("contacto", "==", phone));
                    const querySnapshot = await getDocs(q);

                    const appointments = [];
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);

                    querySnapshot.forEach((doc) => {
                        const data = doc.data();

                        // Parsear fecha DD/MM/YYYY para comparar
                        if (data.fecha) {
                            const partes = data.fecha.split('/');
                            if (partes.length === 3) {
                                const appDate = new Date(partes[2], partes[1] - 1, partes[0]);
                                // Si es hoy o futuro
                                if (appDate >= today) {
                                    appointments.push(data);
                                }
                            }
                        }
                    });

                    // Ordenar por fecha y hora
                    appointments.sort((a, b) => {
                        const [d1, m1, y1] = a.fecha.split('/');
                        const date1 = new Date(y1, m1 - 1, d1);
                        const [d2, m2, y2] = b.fecha.split('/');
                        const date2 = new Date(y2, m2 - 1, d2);

                        if (date1.getTime() !== date2.getTime()) {
                            return date1 - date2;
                        }
                        // Si es la misma fecha, ordenar por hora
                        return a.hora.localeCompare(b.hora);
                    });

                    if (appointments.length === 0) {
                        botResults.innerHTML = '<p style="text-align:center; color: #ff9999;">No se encontraron turnos futuros para este número.</p>';
                    } else {

                                <div style="color: white;">Servicio: <span style="color: #ccc;">${app.servicio}</span></div>
                            `;
                            botResults.appendChild(item);
                        });
                    }

                } catch (error) {
                    console.error("Error consultando bot:", error);
                    botResults.innerHTML = '<p style="color:red; text-align:center;">Error al consultar. Intenta nuevamente.</p>';
                }
            });
        }

            document.getElementById('calendar').addEventListener('change', populateTimeOptions);
