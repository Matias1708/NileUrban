name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: nileurban-c9bd9.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: nileurban-c9bd9
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: nileurban-c9bd9.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "798328145085"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:798328145085:web:placeholder"
          NEXT_PUBLIC_SITE_URL: https://example.com

  functions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npm run build
